name: KAMC live snapshot
on:
  # NOTE: the scheduled trigger is disabled — elab.seha.sa geo-blocks non-Saudi
  # IPs (verified: 403 from GitHub-hosted runners). The scheduled export runs
  # from a Saudi machine instead (scripts/fetch-kamc.mjs via launchd). Keep
  # manual dispatch for the day network policy changes.
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: kamc-live
  cancel-in-progress: false

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Fetch, strip, encrypt
        env:
          GRAFANA_TOKEN: ${{ secrets.GRAFANA_TOKEN }}
          DATA_KEY: ${{ secrets.DATA_KEY }}
        run: node scripts/fetch-kamc.mjs
      - name: Commit snapshot if changed
        run: |
          if git status --porcelain data/ | grep -q .; then
            git config user.name "kamc-live-bot"
            git config user.email "actions@users.noreply.github.com"
            git add data/
            git commit -m "chore: refresh encrypted KAMC snapshot"
            git push
          else
            echo "no changes"
          fi
